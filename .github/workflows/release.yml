# Release 工作流：在打 tag 或手动触发时构建前端、在 4 个指定系统上原生构建二进制、生成安装包并发布 Release。
name: Release Build

on:
  push:
    tags:
      - 'pro-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading prefix (optional)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  # 发布流程不自动取消，避免并发发版时中途打断已开始的构建。
  group: release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  # 统一解析版本号，后续所有 job 直接复用这个输出。
  prepare:
    name: Prepare Version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      app_name: ${{ steps.version.outputs.app_name }}
      release_title: ${{ steps.version.outputs.release_title }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/pro-v* ]]; then
            VERSION="${GITHUB_REF_NAME#pro-v}"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="${INPUT_VERSION#v}"
          else
            VERSION="$(awk '$1 == "PRO_VERSION" { print $3; exit }' Makefile)"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Failed to resolve version" >&2
            exit 1
          fi

          APP_NAME="clawpanel"
          RELEASE_TITLE="ClawPanel Pro v${VERSION}"
          TAG_NAME="pro-v${VERSION}"

          echo "Resolved version=${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "app_name=${APP_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${RELEASE_TITLE}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

  # 前端只构建一次，后续所有平台二进制都复用这份 dist artifact。
  build-frontend:
    name: Build Frontend
    needs: prepare
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 3

  # 只构建 Linux amd64 二进制，供一键安装脚本下载固定资产 clawpanel。
  build-binaries:
    name: Build linux-amd64
    needs: [prepare, build-frontend]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download web dist artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: web/dist

      - name: Embed web dist
        shell: bash
        run: |
          rm -rf cmd/clawpanel/frontend/dist
          mkdir -p cmd/clawpanel/frontend/dist
          cp -R web/dist/. cmd/clawpanel/frontend/dist/

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags "-s -w -X github.com/zhaoxinyi02/ClawPanel/internal/buildinfo.Version=${{ needs.prepare.outputs.version }} -X github.com/zhaoxinyi02/ClawPanel/internal/buildinfo.Edition=pro" -o "${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.version }}-linux-amd64" ./cmd/clawpanel/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-linux-amd64
          path: ${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.version }}-linux-amd64
          retention-days: 30

  # 汇总 Linux amd64 二进制，并生成统一 checksums。
  bundle:
    name: Bundle Release Assets
    needs: [prepare, build-binaries]
    if: ${{ always() && needs.prepare.result == 'success' && needs.build-binaries.result == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: release
          merge-multiple: true

      - name: Add fixed Linux binary alias
        run: |
          set -euo pipefail
          cd release
          cp "clawpanel-v${{ needs.prepare.outputs.version }}-linux-amd64" clawpanel

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum * | sort > checksums.txt

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release/*
          retention-days: 30

  # 只有真正的 tag 发布才会把资产上传到 GitHub Release 页面。
  publish-release:
    name: Publish GitHub Release
    if: ${{ always() && startsWith(github.ref, 'refs/tags/pro-v') && needs.prepare.result == 'success' && needs.bundle.result == 'success' }}
    needs: [prepare, bundle]
    runs-on: ubuntu-24.04

    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_title }}
          generate_release_notes: true
          files: |
            release/*
          fail_on_unmatched_files: true
