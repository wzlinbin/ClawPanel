# Release 工作流：每次推送 main 自动构建 linux-amd64 并更新 latest Release；推送 pro-v* tag 时发布版本 Release。
name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'pro-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading prefix (optional)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      app_name: ${{ steps.version.outputs.app_name }}
      release_title: ${{ steps.version.outputs.release_title }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      is_version_release: ${{ steps.version.outputs.is_version_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          BASE_VERSION="$(awk '$1 == "PRO_VERSION" { print $3; exit }' Makefile)"
          if [[ -z "${BASE_VERSION}" ]]; then
            echo "Failed to resolve PRO_VERSION from Makefile" >&2
            exit 1
          fi

          APP_NAME="clawpanel"
          if [[ "${GITHUB_REF}" == refs/tags/pro-v* ]]; then
            VERSION="${GITHUB_REF_NAME#pro-v}"
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_TITLE="API2CN v${VERSION}"
            IS_VERSION_RELEASE="true"
          else
            VERSION="${INPUT_VERSION:-${BASE_VERSION}}"
            VERSION="${VERSION#v}"
            TAG_NAME="latest"
            RELEASE_TITLE="API2CN latest linux-amd64"
            IS_VERSION_RELEASE="false"
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "app_name=${APP_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${RELEASE_TITLE}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "is_version_release=${IS_VERSION_RELEASE}" >> "${GITHUB_OUTPUT}"

  build-frontend:
    name: Build Frontend
    needs: prepare
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 3

  build-binary:
    name: Build linux-amd64
    needs: [prepare, build-frontend]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download web dist artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: web/dist

      - name: Embed web dist
        shell: bash
        run: |
          rm -rf cmd/clawpanel/frontend/dist
          mkdir -p cmd/clawpanel/frontend/dist
          cp -R web/dist/. cmd/clawpanel/frontend/dist/

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -trimpath \
            -ldflags "-s -w -X github.com/zhaoxinyi02/ClawPanel/internal/buildinfo.Version=${{ needs.prepare.outputs.version }} -X github.com/zhaoxinyi02/ClawPanel/internal/buildinfo.Edition=pro" \
            -o "${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.version }}-linux-amd64" \
            ./cmd/clawpanel/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-linux-amd64
          path: ${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.version }}-linux-amd64
          retention-days: 30

  bundle:
    name: Bundle Release Assets
    needs: [prepare, build-binary]
    runs-on: ubuntu-24.04

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: binary-linux-amd64
          path: release

      - name: Add fixed binary alias
        run: |
          set -euo pipefail
          cd release
          cp "clawpanel-v${{ needs.prepare.outputs.version }}-linux-amd64" clawpanel
          sha256sum * | sort > checksums.txt

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release/*
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs: [prepare, bundle]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Move latest tag to current commit
        if: ${{ needs.prepare.outputs.is_version_release != 'true' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force

      - name: Download bundled artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_title }}
          body: |
            自动构建 linux-amd64 二进制文件。

            - 固定安装资产：`clawpanel`
            - 版本资产：`clawpanel-v${{ needs.prepare.outputs.version }}-linux-amd64`
            - 校验文件：`checksums.txt`
          generate_release_notes: ${{ needs.prepare.outputs.is_version_release == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_version_release == 'true' }}
          files: |
            release/*
          fail_on_unmatched_files: true
          overwrite_files: true
